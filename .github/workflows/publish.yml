name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC — npm trusted publishing, no tokens

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No registry-url here: setup-node would write a NODE_AUTH_TOKEN
      # placeholder into .npmrc, which shadows the OIDC trusted-publishing
      # exchange. Trusted publishing needs only npm >= 11.5.1 + id-token.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install -g npm@latest && npm --version

      - run: npm ci
      - run: npm test

      - name: Version matches release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$TAG" ]; then
            echo "package.json version $PKG != release tag $TAG" >&2
            exit 1
          fi

      # No token: authenticated via OIDC trusted publisher; provenance automatic
      - run: npm publish
